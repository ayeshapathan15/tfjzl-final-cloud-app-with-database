<!DOCTYPE html>
<html>
<head>
    <title>Course Detail</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/css/bootstrap.min.css">
</head>

<body>

<div class="container mt-4">

    <!-- Course Name -->
    <h2>{{ course.name }}</h2>

    <!-- Lessons -->
    <div class="card-columns">
        {% for lesson in course.lesson_set.all %}
        <div class="card mt-2">
            <div class="card-header">
                <h5>Lesson {{ forloop.counter }}: {{ lesson.title }}</h5>
            </div>
            <div class="card-body">
                {{ lesson.content }}
            </div>
        </div>
        {% endfor %}
    </div>

    <!-- Start Exam -->
    <button class="btn btn-primary btn-block mt-3" data-toggle="collapse" data-target="#exam">
        Start Exam
    </button>

    <!-- Exam Form -->
    <div id="exam" class="collapse mt-3">

        <form action="/{{ course.id }}/submit/" method="POST">
            {% csrf_token %}

            {% for question in course.question_set.all %}
            <div class="card mt-3">

                <div class="card-header">
                    <h5>{{ question.content }}</h5>
                </div>

                <div class="card-body">
                    {% for choice in question.choice_set.all %}
                    <div class="form-check">
                        <input type="checkbox"
                               name="choice_{{ choice.id }}"
                               value="{{ choice.id }}"
                               class="form-check-input">
                        <label class="form-check-label">
                            {{ choice.content }}
                        </label>
                    </div>
                    {% endfor %}
                </div>

            </div>
            {% endfor %}

            <input type="submit" value="Submit" class="btn btn-success btn-block mt-3">
        </form>

    </div>

</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
